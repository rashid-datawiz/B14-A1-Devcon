<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Con</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <!-- Header Section-->
    <header>
        <div class="container">
            <nav>
                <div class="logo">
                    <img src="./assets/logo.png" alt="Dev Con Logo">
                </div>

                <ul class="nav-links">
                    <li><a href="#speakers">Speakers</a></li>
                    <li><a href="#schedule">Schedule</a></li>
                    <li><a href="#tracks">Tracks</a></li>
                    <li><a href="#venue">Venue</a></li>
                    <li><a href="#blog">Blog</a></li>
                </ul>

                <button class="common-btn">Register Now</button>
            </nav>
        </div>
    </header>
    <!-- Header Section Ended-->

    <!--Hero Section Starts-->
    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="container hero-content">
            <h1>Code. <em>Connect.</em> Create</h1>
            <p>Join 4,000+ engineers, founders, and builders at the premier developer conference of 2026. Three days of
                cutting-edge talks, hands-on workshops, and meaningful connections.</p>
            <button class="common-btn">Register Now</button>
        </div>
    </section>
    <!--Hero Section Ends-->

</html>
